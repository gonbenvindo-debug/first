<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Completo - PrintCraft</title>
    <meta name="description" content="Catálogo completo de produtos de publicidade da PrintCraft">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/styles.css">
    
    <!-- Custom CSS for Catalog -->
    <style>
        .catalog-header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white;
            padding: 60px 0 30px;
            text-align: center;
        }
        
        .catalog-header h1 {
            font-size: 2.5rem;
            margin-bottom: 16px;
            color: white;
        }
        
        .catalog-header p {
            font-size: 1.1rem;
            color: #cbd5e1;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .catalog-filters {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 20px 0;
        }
        
        .filters-bar {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .filters-row {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        
        .filter-item {
            flex: 1;
            min-width: 200px;
        }
        
        .filter-item.search-item {
            flex: 2;
            min-width: 250px;
        }
        
        .filter-item.view-item {
            flex: 0;
            min-width: auto;
        }
        
        /* Standard select styling */
        .filter-item select,
        .filter-item input {
            width: 100%;
            height: 44px;
            padding: 0 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: white;
            font-size: 14px;
            color: #374151;
            transition: border-color 0.2s;
        }
        
        .filter-item select:focus,
        .filter-item input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        /* Search wrapper with icon */
        .search-wrapper {
            position: relative;
            width: 100%;
        }
        
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 14px;
            pointer-events: none;
            z-index: 1;
        }
        
        .search-wrapper input {
            padding-left: 40px;
        }
        
        .filter-item select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 12px center;
            background-repeat: no-repeat;
            background-size: 16px;
            padding-right: 40px;
        }
        
        /* View buttons */
        .view-item {
            display: flex;
            gap: 2px;
            background: #f3f4f6;
            border-radius: 8px;
            padding: 4px;
        }
        
        .view-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7280;
            transition: all 0.2s;
        }
        
        .view-btn:hover {
            color: #374151;
        }
        
        .view-btn.active {
            background: white;
            color: #3b82f6;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
        
        /* Results info */
        .results-info {
            font-size: 14px;
            color: #6b7280;
            text-align: center;
        }
        
        .results-info span {
            font-weight: 600;
            color: #3b82f6;
        }
        
        /* Catalog grid */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .catalog-grid.list-view {
            grid-template-columns: 1fr;
            gap: 20px;
        }
        
        .product-card.list-view {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        
        .product-card.list-view .product-image {
            width: 200px;
            height: 150px;
            flex-shrink: 0;
        }
        
        .product-card.list-view .product-info {
            flex: 1;
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap;
        }
        
        .pagination button {
            height: 40px;
            min-width: 40px;
            padding: 0 12px;
            border: 1px solid #d1d5db;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            color: #374151;
            font-size: 14px;
            font-weight: 500;
        }
        
        .pagination button:hover:not(:disabled) {
            background: #f9fafb;
            border-color: #9ca3af;
        }
        
        .pagination button.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
        
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .pagination-info {
            color: #6b7280;
            font-size: 14px;
            margin: 0 16px;
        }
        
        /* Mobile responsive */
        @media (max-width: 768px) {
            .catalog-header {
                padding: 40px 20px 20px;
            }
            
            .catalog-header h1 {
                font-size: 2rem;
            }
            
            .filters-bar {
                padding: 0 16px;
            }
            
            .filters-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
                align-items: start;
            }
            
            .filter-item.search-item {
                grid-column: 1 / -1;
            }
            
            .filter-item.view-item {
                grid-column: 2;
                justify-self: end;
            }
            
            .catalog-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
                padding: 30px 16px;
            }
            
            .product-card.list-view {
                flex-direction: column;
                text-align: center;
                gap: 20px;
            }
            
            .product-card.list-view .product-image {
                width: 100%;
                height: 200px;
            }
            
            .pagination {
                padding: 30px 16px;
                gap: 6px;
            }
            
            .pagination button {
                height: 36px;
                min-width: 36px;
                padding: 0 10px;
                font-size: 13px;
            }
            
            .pagination-info {
                font-size: 13px;
                margin: 0 12px;
            }
        }
        
        @media (max-width: 480px) {
            .filters-row {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            
            .filter-item.search-item {
                grid-column: 1;
            }
            
            .filter-item.view-item {
                grid-column: 1;
                justify-self: start;
            }
            
            .catalog-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            
            .filter-item select,
            .filter-item input {
                height: 40px;
                font-size: 16px; /* Prevent zoom on iOS */
            }
            
            .view-btn {
                width: 32px;
                height: 32px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Placeholder -->
    <div id="navbar-placeholder"></div>

    <!-- Catalog Header -->
    <section class="catalog-header">
        <div class="container">
            <h1>Catálogo Completo</h1>
            <p>Explore toda a nossa gama de produtos de publicidade e marketing</p>
        </div>
    </section>

    <!-- Catalog Filters -->
    <section class="catalog-filters">
        <div class="container">
            <div class="filters-bar">
                <div class="filters-row">
                    <!-- Category Dropdown -->
                    <div class="filter-item">
                        <select id="category-select" onchange="selectCategorySimple(this.value)">
                            <option value="all">Todas Categorias</option>
                            <option value="flybanners">Flybanners</option>
                            <option value="rollups">Roll-ups</option>
                            <option value="xbanners">X-Banners</option>
                            <option value="lonas">Lonas</option>
                        </select>
                    </div>
                    
                    <!-- Sort Dropdown -->
                    <div class="filter-item">
                        <select id="sort-select" onchange="sortProducts()">
                            <option value="created_at-desc">Mais Recentes</option>
                            <option value="created_at-asc">Mais Antigos</option>
                            <option value="price-asc">Preço: Menor para Maior</option>
                            <option value="price-desc">Preço: Maior para Menor</option>
                            <option value="name-asc">Nome: A-Z</option>
                            <option value="name-desc">Nome: Z-A</option>
                        </select>
                    </div>
                    
                    <!-- Search -->
                    <div class="filter-item search-item">
                        <div class="search-wrapper">
                            <i class="fas fa-search search-icon"></i>
                            <input type="text" id="search-input" placeholder="Pesquisar..." onkeyup="searchProducts()">
                        </div>
                    </div>
                    
                    <!-- View Toggle -->
                    <div class="filter-item view-item">
                        <button type="button" class="view-btn active" data-view="grid" onclick="changeView('grid')">
                            <i class="fas fa-th"></i>
                        </button>
                        <button type="button" class="view-btn" data-view="list" onclick="changeView('list')">
                            <i class="fas fa-list"></i>
                        </button>
                    </div>
                </div>
                
                <div class="results-info">
                    <span id="products-count">0</span> produtos encontrados
                </div>
            </div>
        </div>
    </section>

    <!-- Catalog Grid -->
    <section class="catalog-section">
        <div class="container">
            <div class="catalog-grid" id="catalog-grid">
                <!-- Products will be loaded here -->
            </div>
            
            <!-- Pagination -->
            <div class="pagination" id="pagination">
                <!-- Pagination will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Cart Sidebar Placeholder -->
    <div id="cart-placeholder"></div>

    <!-- Toast Placeholder -->
    <div id="toast-placeholder"></div>
    
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/script-catalog.js"></script>
</body>
</html>
