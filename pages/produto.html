<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto - PrintCraft</title>
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/footer-enhanced.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        .product-page {
            padding: 120px 0 60px;
            min-height: 100vh;
            background: #f8fafc;
        }
        .product-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .product-gallery {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .product-image-main {
            width: 100%;
            aspect-ratio: 1;
            object-fit: contain;
            border-radius: 12px;
            background: #f1f5f9;
        }
        .product-info {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .product-title {
            font-size: 2rem;
            font-weight: 700;
            color: #1f2937;
            margin: 0;
        }
        .product-category {
            display: inline-block;
            background: #e0e7ff;
            color: #4f46e5;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .product-description {
            color: #6b7280;
            line-height: 1.7;
            font-size: 1rem;
        }
        .product-price {
            font-size: 2.5rem;
            font-weight: 700;
            color: #4f46e5;
        }
        .product-price span {
            font-size: 1rem;
            color: #9ca3af;
            font-weight: 400;
        }
        
        /* Variantes */
        .variants-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e5e7eb;
        }
        .variants-title {
            font-size: 1rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 12px;
        }
        .variants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }
        .variant-btn {
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .variant-btn:hover {
            border-color: #4f46e5;
        }
        .variant-btn.active {
            border-color: #4f46e5;
            background: #eef2ff;
        }
        .variant-btn .size {
            font-weight: 600;
            color: #1f2937;
            font-size: 0.95rem;
        }
        .variant-btn .price {
            color: #4f46e5;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 4px;
        }
        
        /* Botão Personalizar */
        .customize-btn {
            width: 100%;
            padding: 18px 32px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }
        .customize-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.4);
        }
        
        /* Editor Modal */
        .editor-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            overflow: auto;
        }
        .editor-modal.active {
            display: flex;
        }
        .editor-container {
            display: flex;
            width: 100%;
            height: 100%;
        }
        
        /* Sidebar do Editor */
        .editor-sidebar {
            width: 320px;
            background: #1f2937;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
        }
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid #374151;
        }
        .editor-header h3 {
            color: white;
            font-size: 1.2rem;
            margin: 0;
        }
        .close-editor {
            background: none;
            border: none;
            color: #9ca3af;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .close-editor:hover {
            color: white;
        }
        
        /* Ferramentas */
        .tool-section {
            background: #374151;
            border-radius: 10px;
            padding: 16px;
        }
        .tool-section h4 {
            color: #e5e7eb;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 0 0 12px 0;
        }
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .tool-btn {
            aspect-ratio: 1;
            background: #4b5563;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.2s;
        }
        .tool-btn:hover {
            background: #4f46e5;
        }
        .tool-btn.active {
            background: #4f46e5;
        }
        
        /* Input de texto */
        .text-input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .text-input-group input,
        .text-input-group select {
            padding: 10px 12px;
            background: #4b5563;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
        }
        .text-input-group input::placeholder {
            color: #9ca3af;
        }
        .text-input-group label {
            color: #9ca3af;
            font-size: 0.8rem;
        }
        
        /* Cores */
        .color-picker-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .color-picker-row input[type="color"] {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .color-presets {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .color-preset {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }
        .color-preset:hover {
            transform: scale(1.1);
        }
        
        /* Área do Canvas */
        .editor-canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: #111827;
            position: relative;
        }
        .canvas-wrapper {
            position: relative;
            background: white;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .canvas-info {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            color: #9ca3af;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .bleed-indicator {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            border: 2px dashed #ef4444;
            opacity: 0.5;
        }
        
        /* Barra de ações */
        .editor-actions {
            display: flex;
            gap: 10px;
            padding-top: 16px;
            border-top: 1px solid #374151;
        }
        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn.primary {
            background: #4f46e5;
            color: white;
        }
        .action-btn.primary:hover {
            background: #4338ca;
        }
        .action-btn.secondary {
            background: #4b5563;
            color: white;
        }
        .action-btn.secondary:hover {
            background: #6b7280;
        }
        
        /* Upload de imagem */
        .upload-area {
            border: 2px dashed #4b5563;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-area:hover {
            border-color: #4f46e5;
            background: rgba(79, 70, 229, 0.1);
        }
        .upload-area i {
            font-size: 2rem;
            color: #9ca3af;
            margin-bottom: 8px;
        }
        .upload-area p {
            color: #9ca3af;
            font-size: 0.85rem;
            margin: 0;
        }
        
        /* Slider */
        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .slider-group label {
            color: #9ca3af;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
        }
        .slider-group input[type="range"] {
            width: 100%;
            accent-color: #4f46e5;
        }
        
        /* Responsivo */
        @media (max-width: 1024px) {
            .product-container {
                grid-template-columns: 1fr;
            }
            .editor-container {
                flex-direction: column;
            }
            .editor-sidebar {
                width: 100%;
                max-height: 40vh;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-logo">
                    <h1><a href="../index.html"><i class="fas fa-print"></i> PrintCraft</a></h1>
                </div>
                <ul class="nav-menu">
                    <li><a href="../index.html#home">Início</a></li>
                    <li><a href="../index.html#products">Produtos</a></li>
                    <li><a href="../index.html#services">Serviços</a></li>
                    <li><a href="../index.html#contact">Contacto</a></li>
                </ul>
                <div class="nav-icons">
                    <button class="cart-btn" onclick="toggleCart()">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cart-count">0</span>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <!-- Página do Produto -->
    <main class="product-page">
        <div class="product-container">
            <!-- Galeria -->
            <div class="product-gallery">
                <img id="product-image" class="product-image-main" src="" alt="Produto">
            </div>
            
            <!-- Info do Produto -->
            <div class="product-info">
                <span id="product-category" class="product-category"></span>
                <h1 id="product-title" class="product-title"></h1>
                <p id="product-description" class="product-description"></p>
                
                <!-- Variantes -->
                <div class="variants-section">
                    <h4 class="variants-title"><i class="fas fa-ruler"></i> Escolha o Tamanho</h4>
                    <div id="variants-grid" class="variants-grid">
                        <!-- Variantes carregadas dinamicamente -->
                    </div>
                </div>
                
                <!-- Preço -->
                <div class="product-price">
                    €<span id="product-price">0.00</span>
                    <span>+ IVA</span>
                </div>
                
                <!-- Botão Personalizar -->
                <button class="customize-btn" onclick="openEditor()">
                    <i class="fas fa-palette"></i>
                    Personalizar Design
                </button>
            </div>
        </div>
    </main>

    <!-- Editor Modal -->
    <div id="editor-modal" class="editor-modal">
        <div class="editor-container">
            <!-- Sidebar -->
            <div class="editor-sidebar">
                <div class="editor-header">
                    <h3><i class="fas fa-palette"></i> Editor de Design</h3>
                    <button class="close-editor" onclick="closeEditor()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <!-- Ferramentas -->
                <div class="tool-section">
                    <h4>Ferramentas</h4>
                    <div class="tool-grid">
                        <button class="tool-btn" onclick="addText()" title="Adicionar Texto">
                            <i class="fas fa-font"></i>
                        </button>
                        <button class="tool-btn" onclick="document.getElementById('image-upload').click()" title="Adicionar Imagem">
                            <i class="fas fa-image"></i>
                        </button>
                        <button class="tool-btn" onclick="addRect()" title="Retângulo">
                            <i class="fas fa-square"></i>
                        </button>
                        <button class="tool-btn" onclick="addCircle()" title="Círculo">
                            <i class="fas fa-circle"></i>
                        </button>
                        <button class="tool-btn" onclick="addTriangle()" title="Triângulo">
                            <i class="fas fa-play"></i>
                        </button>
                        <button class="tool-btn" onclick="addLine()" title="Linha">
                            <i class="fas fa-minus"></i>
                        </button>
                        <button class="tool-btn" onclick="deleteSelected()" title="Apagar">
                            <i class="fas fa-trash"></i>
                        </button>
                        <button class="tool-btn" onclick="clearCanvas()" title="Limpar Tudo">
                            <i class="fas fa-eraser"></i>
                        </button>
                    </div>
                    <input type="file" id="image-upload" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
                </div>
                
                <!-- Texto -->
                <div class="tool-section">
                    <h4>Texto</h4>
                    <div class="text-input-group">
                        <input type="text" id="text-input" placeholder="Digite o texto..." onkeyup="updateSelectedText()">
                        <select id="font-family" onchange="updateSelectedFont()">
                            <option value="Arial">Arial</option>
                            <option value="Helvetica">Helvetica</option>
                            <option value="Times New Roman">Times New Roman</option>
                            <option value="Georgia">Georgia</option>
                            <option value="Verdana">Verdana</option>
                            <option value="Impact">Impact</option>
                            <option value="Comic Sans MS">Comic Sans MS</option>
                        </select>
                        <div class="slider-group">
                            <label>Tamanho: <span id="font-size-value">40</span>px</label>
                            <input type="range" id="font-size" min="12" max="200" value="40" onchange="updateFontSize()">
                        </div>
                    </div>
                </div>
                
                <!-- Cores -->
                <div class="tool-section">
                    <h4>Cor de Preenchimento</h4>
                    <div class="color-picker-row">
                        <input type="color" id="fill-color" value="#000000" onchange="updateFillColor()">
                        <div class="color-presets">
                            <div class="color-preset" style="background:#000000" onclick="setFillColor('#000000')"></div>
                            <div class="color-preset" style="background:#ffffff; border-color:#ccc" onclick="setFillColor('#ffffff')"></div>
                            <div class="color-preset" style="background:#ef4444" onclick="setFillColor('#ef4444')"></div>
                            <div class="color-preset" style="background:#f97316" onclick="setFillColor('#f97316')"></div>
                            <div class="color-preset" style="background:#eab308" onclick="setFillColor('#eab308')"></div>
                            <div class="color-preset" style="background:#22c55e" onclick="setFillColor('#22c55e')"></div>
                            <div class="color-preset" style="background:#3b82f6" onclick="setFillColor('#3b82f6')"></div>
                            <div class="color-preset" style="background:#8b5cf6" onclick="setFillColor('#8b5cf6')"></div>
                        </div>
                    </div>
                </div>
                
                <!-- Camadas -->
                <div class="tool-section">
                    <h4>Camadas</h4>
                    <div class="tool-grid">
                        <button class="tool-btn" onclick="bringToFront()" title="Trazer para Frente">
                            <i class="fas fa-layer-group"></i>
                        </button>
                        <button class="tool-btn" onclick="sendToBack()" title="Enviar para Trás">
                            <i class="fas fa-layer-group" style="transform: rotate(180deg)"></i>
                        </button>
                        <button class="tool-btn" onclick="duplicateSelected()" title="Duplicar">
                            <i class="fas fa-copy"></i>
                        </button>
                        <button class="tool-btn" onclick="flipHorizontal()" title="Espelhar H">
                            <i class="fas fa-arrows-alt-h"></i>
                        </button>
                    </div>
                </div>
                
                <!-- Ações -->
                <div class="editor-actions">
                    <button class="action-btn secondary" onclick="downloadDesign()">
                        <i class="fas fa-download"></i> Exportar
                    </button>
                    <button class="action-btn primary" onclick="saveAndAddToCart()">
                        <i class="fas fa-cart-plus"></i> Adicionar
                    </button>
                </div>
            </div>
            
            <!-- Canvas Area -->
            <div class="editor-canvas-area">
                <div class="canvas-wrapper" id="canvas-wrapper">
                    <canvas id="design-canvas"></canvas>
                    <div class="canvas-info" id="canvas-info">85 x 200 cm | Sangramento: 3mm</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Variáveis globais
        let canvas;
        let currentProduct = null;
        let currentVariant = null;
        let variants = [];
        
        // Configuração do Supabase
        const SUPABASE_URL = 'https://sgoafvyygsmucmzssraa.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNnb2Fmdnl5Z3NtdWNtenNzcmFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTAxODQsImV4cCI6MjA4ODk4NjE4NH0.JvxNdhCO-ucRtr2ew0M-TQHdsoMW4BzzUaRtXsl9HDM';
        
        // Carregar produto
        async function loadProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');
            
            if (!slug) {
                window.location.href = '../index.html#products';
                return;
            }
            
            try {
                const headers = {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json'
                };
                
                // Buscar produto
                const productRes = await fetch(`${SUPABASE_URL}/rest/v1/products?slug=eq.${slug}&select=*`, { headers });
                const products = await productRes.json();
                
                if (!products || products.length === 0) {
                    console.error('Produto não encontrado:', slug);
                    window.location.href = '../index.html#products';
                    return;
                }
                
                currentProduct = products[0];
                
                // Buscar variantes
                const variantsRes = await fetch(`${SUPABASE_URL}/rest/v1/product_variants?product_id=eq.${currentProduct.id}&order=sort_order`, { headers });
                variants = await variantsRes.json();
                
                // Renderizar
                renderProduct();
                renderVariants();
                
            } catch (error) {
                console.error('Erro ao carregar produto:', error);
            }
        }
        
        function renderProduct() {
            document.getElementById('product-title').textContent = currentProduct.name;
            document.getElementById('product-description').textContent = currentProduct.description;
            document.getElementById('product-image').src = currentProduct.image_url;
            document.getElementById('product-category').textContent = currentProduct.category;
            document.title = `${currentProduct.name} - PrintCraft`;
            
            // Preço inicial
            if (variants.length > 0) {
                selectVariant(variants[0]);
            } else {
                document.getElementById('product-price').textContent = currentProduct.price.toFixed(2);
            }
        }
        
        function renderVariants() {
            const grid = document.getElementById('variants-grid');
            
            if (variants.length === 0) {
                grid.innerHTML = '<p style="color:#6b7280">Tamanho único disponível</p>';
                return;
            }
            
            grid.innerHTML = variants.map((v, i) => `
                <button class="variant-btn ${i === 0 ? 'active' : ''}" onclick="selectVariant(variants[${i}], this)">
                    <div class="size">${v.size_label}</div>
                    <div class="price">€${v.price.toFixed(2)}</div>
                </button>
            `).join('');
        }
        
        function selectVariant(variant, btn) {
            currentVariant = variant;
            document.getElementById('product-price').textContent = variant.price.toFixed(2);
            
            // Atualizar botão ativo
            document.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
        }
        
        // Editor
        function openEditor() {
            if (!currentVariant && variants.length > 0) {
                currentVariant = variants[0];
            }
            
            document.getElementById('editor-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
            
            initCanvas();
        }
        
        function closeEditor() {
            document.getElementById('editor-modal').classList.remove('active');
            document.body.style.overflow = '';
        }
        
        function initCanvas() {
            const wrapper = document.getElementById('canvas-wrapper');
            const variant = currentVariant || { width_cm: 85, height_cm: 200, bleed_mm: 3 };
            
            // Calcular dimensões do canvas (escala para caber na tela)
            const maxWidth = window.innerWidth - 400;
            const maxHeight = window.innerHeight - 120;
            const aspectRatio = variant.width_cm / variant.height_cm;
            
            let canvasWidth, canvasHeight;
            if (aspectRatio > maxWidth / maxHeight) {
                canvasWidth = Math.min(maxWidth, 600);
                canvasHeight = canvasWidth / aspectRatio;
            } else {
                canvasHeight = Math.min(maxHeight, 700);
                canvasWidth = canvasHeight * aspectRatio;
            }
            
            // Criar canvas
            if (canvas) {
                canvas.dispose();
            }
            
            const canvasEl = document.getElementById('design-canvas');
            canvasEl.width = canvasWidth;
            canvasEl.height = canvasHeight;
            
            canvas = new fabric.Canvas('design-canvas', {
                width: canvasWidth,
                height: canvasHeight,
                backgroundColor: '#ffffff',
                selection: true
            });
            
            // Adicionar guias de sangramento
            const bleedPx = (variant.bleed_mm / 10) * (canvasWidth / variant.width_cm);
            addBleedGuides(bleedPx);
            
            // Info
            document.getElementById('canvas-info').textContent = 
                `${variant.width_cm} x ${variant.height_cm} cm | Sangramento: ${variant.bleed_mm}mm`;
            
            // Eventos
            canvas.on('selection:created', updateToolsFromSelection);
            canvas.on('selection:updated', updateToolsFromSelection);
        }
        
        function addBleedGuides(bleed) {
            // Área segura (linha tracejada vermelha)
            const safeArea = new fabric.Rect({
                left: bleed,
                top: bleed,
                width: canvas.width - bleed * 2,
                height: canvas.height - bleed * 2,
                fill: 'transparent',
                stroke: '#ef4444',
                strokeWidth: 1,
                strokeDashArray: [5, 5],
                selectable: false,
                evented: false
            });
            canvas.add(safeArea);
            canvas.sendToBack(safeArea);
        }
        
        // Ferramentas
        function addText() {
            const text = new fabric.IText('Seu texto aqui', {
                left: canvas.width / 2,
                top: canvas.height / 2,
                fontFamily: 'Arial',
                fontSize: 40,
                fill: '#000000',
                originX: 'center',
                originY: 'center'
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        }
        
        function addRect() {
            const rect = new fabric.Rect({
                left: canvas.width / 2 - 50,
                top: canvas.height / 2 - 50,
                width: 100,
                height: 100,
                fill: '#3b82f6',
                stroke: '#1d4ed8',
                strokeWidth: 2
            });
            canvas.add(rect);
            canvas.setActiveObject(rect);
        }
        
        function addCircle() {
            const circle = new fabric.Circle({
                left: canvas.width / 2 - 50,
                top: canvas.height / 2 - 50,
                radius: 50,
                fill: '#22c55e',
                stroke: '#16a34a',
                strokeWidth: 2
            });
            canvas.add(circle);
            canvas.setActiveObject(circle);
        }
        
        function addTriangle() {
            const triangle = new fabric.Triangle({
                left: canvas.width / 2 - 50,
                top: canvas.height / 2 - 50,
                width: 100,
                height: 100,
                fill: '#f97316'
            });
            canvas.add(triangle);
            canvas.setActiveObject(triangle);
        }
        
        function addLine() {
            const line = new fabric.Line([50, 50, 200, 50], {
                left: canvas.width / 2 - 75,
                top: canvas.height / 2,
                stroke: '#000000',
                strokeWidth: 3
            });
            canvas.add(line);
            canvas.setActiveObject(line);
        }
        
        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                fabric.Image.fromURL(event.target.result, function(img) {
                    // Escalar imagem para caber no canvas
                    const scale = Math.min(
                        (canvas.width * 0.8) / img.width,
                        (canvas.height * 0.8) / img.height
                    );
                    img.scale(scale);
                    img.set({
                        left: canvas.width / 2,
                        top: canvas.height / 2,
                        originX: 'center',
                        originY: 'center'
                    });
                    canvas.add(img);
                    canvas.setActiveObject(img);
                });
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        }
        
        function deleteSelected() {
            const active = canvas.getActiveObjects();
            active.forEach(obj => {
                if (obj.selectable !== false) {
                    canvas.remove(obj);
                }
            });
            canvas.discardActiveObject();
        }
        
        function clearCanvas() {
            if (confirm('Tem certeza que deseja limpar todo o design?')) {
                canvas.getObjects().forEach(obj => {
                    if (obj.selectable !== false) {
                        canvas.remove(obj);
                    }
                });
            }
        }
        
        function updateSelectedText() {
            const obj = canvas.getActiveObject();
            if (obj && obj.type === 'i-text') {
                obj.set('text', document.getElementById('text-input').value);
                canvas.renderAll();
            }
        }
        
        function updateSelectedFont() {
            const obj = canvas.getActiveObject();
            if (obj && obj.type === 'i-text') {
                obj.set('fontFamily', document.getElementById('font-family').value);
                canvas.renderAll();
            }
        }
        
        function updateFontSize() {
            const size = document.getElementById('font-size').value;
            document.getElementById('font-size-value').textContent = size;
            const obj = canvas.getActiveObject();
            if (obj && obj.type === 'i-text') {
                obj.set('fontSize', parseInt(size));
                canvas.renderAll();
            }
        }
        
        function updateFillColor() {
            const color = document.getElementById('fill-color').value;
            const obj = canvas.getActiveObject();
            if (obj) {
                obj.set('fill', color);
                canvas.renderAll();
            }
        }
        
        function setFillColor(color) {
            document.getElementById('fill-color').value = color;
            updateFillColor();
        }
        
        function updateToolsFromSelection() {
            const obj = canvas.getActiveObject();
            if (obj) {
                if (obj.type === 'i-text') {
                    document.getElementById('text-input').value = obj.text;
                    document.getElementById('font-family').value = obj.fontFamily;
                    document.getElementById('font-size').value = obj.fontSize;
                    document.getElementById('font-size-value').textContent = obj.fontSize;
                }
                if (obj.fill) {
                    document.getElementById('fill-color').value = obj.fill;
                }
            }
        }
        
        function bringToFront() {
            const obj = canvas.getActiveObject();
            if (obj) {
                canvas.bringToFront(obj);
            }
        }
        
        function sendToBack() {
            const obj = canvas.getActiveObject();
            if (obj) {
                canvas.sendToBack(obj);
                // Manter guias atrás
                canvas.getObjects().forEach(o => {
                    if (o.selectable === false) canvas.sendToBack(o);
                });
            }
        }
        
        function duplicateSelected() {
            const obj = canvas.getActiveObject();
            if (obj) {
                obj.clone(function(cloned) {
                    cloned.set({
                        left: obj.left + 20,
                        top: obj.top + 20
                    });
                    canvas.add(cloned);
                    canvas.setActiveObject(cloned);
                });
            }
        }
        
        function flipHorizontal() {
            const obj = canvas.getActiveObject();
            if (obj) {
                obj.set('flipX', !obj.flipX);
                canvas.renderAll();
            }
        }
        
        function downloadDesign() {
            const dataURL = canvas.toDataURL({
                format: 'png',
                quality: 1,
                multiplier: 3
            });
            const link = document.createElement('a');
            link.download = `design-${currentProduct.slug}.png`;
            link.href = dataURL;
            link.click();
        }
        
        function saveAndAddToCart() {
            const designData = canvas.toJSON();
            const designImage = canvas.toDataURL({ format: 'png', quality: 0.8 });
            
            // Guardar no localStorage
            const cartItem = {
                product: currentProduct,
                variant: currentVariant,
                design: designData,
                designImage: designImage,
                quantity: 1,
                addedAt: new Date().toISOString()
            };
            
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.push(cartItem);
            localStorage.setItem('cart', JSON.stringify(cart));
            
            alert('Design adicionado ao carrinho!');
            closeEditor();
            updateCartCount();
        }
        
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            document.getElementById('cart-count').textContent = cart.length;
        }
        
        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            loadProduct();
            updateCartCount();
        });
        
        // Atalhos de teclado
        document.addEventListener('keydown', (e) => {
            if (!canvas) return;
            
            if (e.key === 'Delete' || e.key === 'Backspace') {
                deleteSelected();
            }
            if (e.ctrlKey && e.key === 'd') {
                e.preventDefault();
                duplicateSelected();
            }
        });
    </script>
</body>
</html>
